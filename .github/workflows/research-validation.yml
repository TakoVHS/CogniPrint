name: CogniPrint Research Validation

on:
  workflow_dispatch:
    inputs:
      run_demo:
        description: 'Run demo target'
        required: false
        default: 'true'
      run_sample_study:
        description: 'Run sample study target'
        required: false
        default: 'true'

jobs:
  validation:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bootstrap environment
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Initialize workspace
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          cogniprint init-workspace

      - name: Run smoke target
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          make smoke

      - name: Run demo target when requested
        if: ${{ inputs.run_demo == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          make demo

      - name: Run sample study target when requested
        if: ${{ inputs.run_sample_study == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          make sample-study

      - name: Upload generated workspace artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cogniprint-workspace-artifacts
          path: |
            workspace/runs
            workspace/studies
            workspace/reports
            workspace/exports
          if-no-files-found: ignore
