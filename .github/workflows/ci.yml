name: CogniPrint CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bootstrap virtual environment
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          make test

      - name: Run API contract tests
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          make api-contract-test

      - name: Run API runtime smoke
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          make api-runtime-smoke

      - name: Check metadata consistency
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          python scripts/check_metadata_consistency.py

      - name: Check claims drift
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          python scripts/check_claims_drift.py

      - name: Verify import compilation
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          python -m compileall -q src tests scripts apps/api/app apps/api/tests

      - name: Run lightweight smoke checks
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          make smoke
