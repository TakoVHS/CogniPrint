name: CogniPrint CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

concurrency:
  group: cogniprint-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bootstrap virtual environment
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          make test

      - name: Run API contract tests
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          make api-contract-test

      - name: Run API runtime smoke
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          make api-runtime-smoke

      - name: Check metadata consistency
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          python scripts/check_metadata_consistency.py

      - name: Check claims drift
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          python scripts/check_claims_drift.py

      - name: Verify import compilation
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          python -m compileall -q src tests scripts apps/api/app apps/api/tests

      - name: Run lightweight smoke checks
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          make smoke

  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 20.20.0
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.0'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Audit optional web app dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd apps/web
          npm ci
          npm audit --audit-level=moderate

      - name: Build optional web app
        shell: bash
        run: |
          set -euo pipefail
          cd apps/web
          npm run build

  web-browser-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [test, web-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bootstrap virtual environment
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Set up Node 20.20.0
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.0'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install optional web dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd apps/web
          npm ci

      - name: Run browser-level hosted flow verification
        shell: bash
        run: |
          set -euo pipefail
          export WEB_BROWSER_VERIFY_SKIP_NPM_CI=1
          bash scripts/web_browser_verify.sh

      - name: Publish browser verification summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f workspace/browser-verify/verification-summary.json ]]; then
            {
              echo "## Web browser verify"
              echo
              echo "No structured summary was produced."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          summary = json.loads(Path("workspace/browser-verify/verification-summary.json").read_text())
          durations = summary.get("durations_seconds", {})

          print("## Web browser verify")
          print()
          print(f"- status: `{summary.get('status')}`")
          print(f"- stage: `{summary.get('stage')}`")
          print(f"- api: `{summary.get('api_base_url')}`")
          print(f"- web: `{summary.get('web_base_url')}`")
          print(f"- screenshot: `{summary.get('screenshot_path')}`")
          print(f"- api ready: `{durations.get('api_ready')}` s")
          print(f"- web ready: `{durations.get('web_ready')}` s")
          print(f"- total: `{durations.get('total')}` s")
          PY

      - name: Upload browser verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-browser-verify
          path: |
            workspace/browser-verify/
            .web-browser-verify-api.log
            .web-browser-verify-web.log
          if-no-files-found: ignore
